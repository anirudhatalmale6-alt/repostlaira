name: iOS Build & Submit
on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to App Store after build'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16* 2>/dev/null | sort -V | tail -1 || ls -d /Applications/Xcode* 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Restore iOS signing files
        run: |
          echo '${{ secrets.IOS_PROVISION_PROFILE }}' | base64 --decode > RepostLaira_AppStore.mobileprovision
          echo '${{ secrets.IOS_DIST_CERT }}' | base64 --decode > dist_cert.p12
          echo '${{ secrets.ASC_API_KEY }}' | base64 --decode > AuthKey_K2QW79TPA6.p8
          cat > credentials.json << 'EOF'
          {
            "ios": {
              "provisioningProfilePath": "./RepostLaira_AppStore.mobileprovision",
              "distributionCertificate": {
                "path": "./dist_cert.p12",
                "password": "arialtravel2026"
              }
            }
          }
          EOF

      - name: Build iOS locally
        run: eas build --platform ios --profile production --local --non-interactive --output ./RepostLaira.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RepostLaira-iOS
          path: mobile/RepostLaira.ipa

      - name: Submit to App Store
        if: ${{ github.event.inputs.submit == 'true' }}
        run: eas submit --platform ios --path ./RepostLaira.ipa --non-interactive
