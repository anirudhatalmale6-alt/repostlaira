<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main blue-to-purple gradient (top-left to bottom-right) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Slightly lighter gradient for phone screen -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B9CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9C5AED" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Glow gradient for the repost arrows -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="phoneShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App icon background: rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Phone body: rounded rectangle, white outline style -->
  <g filter="url(#phoneShadow)">
    <rect x="156" y="72" width="200" height="368" rx="28" ry="28"
          fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round"/>

    <!-- Phone screen area (inner rectangle) -->
    <rect x="172" y="108" width="168" height="264" rx="8" ry="8"
          fill="url(#screenGrad)" stroke="none"/>

    <!-- Phone bottom home indicator / bar -->
    <rect x="224" y="400" width="64" height="6" rx="3" ry="3" fill="#ffffff" opacity="0.5"/>

    <!-- Phone top notch / speaker -->
    <rect x="224" y="88" width="64" height="6" rx="3" ry="3" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Circular repost arrows on the phone screen -->
  <g transform="translate(256, 240)">
    <!-- Circular arrow path: two arcs with arrowheads forming a cycle -->
    <!-- Top-right arrow (clockwise) -->
    <path d="M 0,-52 A 52,52 0 0,1 45,26"
          fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <!-- Arrowhead for top-right -->
    <polygon points="45,26 55,8 33,14" fill="#ffffff"/>

    <!-- Bottom-left arrow (clockwise, continuing the circle) -->
    <path d="M 0,52 A 52,52 0 0,1 -45,-26"
          fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <!-- Arrowhead for bottom-left -->
    <polygon points="-45,-26 -55,-8 -33,-14" fill="#ffffff"/>
  </g>

  <!-- Small play triangle in the center of the repost circle -->
  <g transform="translate(256, 240)">
    <polygon points="-10,-14 -10,14 14,0" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
